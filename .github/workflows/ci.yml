name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (Native)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Clippy (WASM Worker)
        run: cargo clippy -p arxiv-search-rs-mcp-worker --target wasm32-unknown-unknown --all-features -- -D warnings
        working-directory: crates/worker

      - name: Build Native
        run: cargo build --release -p arxiv-search-rs-mcp

      - name: Build WASM Worker
        run: cargo build --release --target wasm32-unknown-unknown -p arxiv-search-rs-mcp-worker
        working-directory: crates/worker

      - name: Run Unit Tests
        run: cargo test --workspace --exclude arxiv-search-rs-mcp-worker --lib --bins

      # We skip running tests that require network access since GitHub runners share IPs
      # and easily trigger arXiv's 429 rate limiting.
